# Runs Playwright on macOS and Windows so shortcuts, paths, and browsers stay honest cross-platform.
#
# Full E2E needs a reachable app + API (dev-session enabled — not production API).
# Set repo variable PLAYWRIGHT_BASE_URL (e.g. https://your-app.vercel.app) or pass
# workflow_dispatch "base_url" to run the suite in CI.

name: Playwright E2E

on:
  push:
    branches: [main, development]
  pull_request:
  workflow_dispatch:
    inputs:
      base_url:
        description: "PLAYWRIGHT_BASE_URL (overrides repo variable for this run)"
        required: false
        type: string

jobs:
  e2e:
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Install Playwright (Chromium)
        run: npx playwright install --with-deps chromium

      - name: Validate Playwright config
        run: npx playwright test --list

      - name: Run Playwright E2E (hosted)
        # Avoid running with an empty URL on push/PR (workflow_dispatch inputs are absent there).
        if: >-
          ${{ vars.PLAYWRIGHT_BASE_URL != '' ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.base_url != '') }}
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: ${{ github.event.inputs.base_url || vars.PLAYWRIGHT_BASE_URL }}
        run: npx playwright test --workers=1
